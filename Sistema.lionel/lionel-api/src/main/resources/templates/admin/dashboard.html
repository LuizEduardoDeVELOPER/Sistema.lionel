<!DOCTYPE HTML>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ecf0f1;
        }
        .card {
            background: #34495e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { color: #e74c3c; }
        a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            color: #333;
            background-color: #2ecc71;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        a:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <div class="card">
        <h1>⚙️ PAINEL ADMIN</h1>
        <p>Área administrativa carregada perfeitamente.</p>
        <a th:href="@{/}">Voltar para Home</a>
    </div>

</body>
</html>
